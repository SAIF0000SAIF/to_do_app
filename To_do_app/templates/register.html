{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>Register</title>
    <link rel="stylesheet" href="{% static 'To_do_app/style.css' %}">
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <h2 class="auth-title">Create Account ✨</h2>
            <p class="auth-subtitle">Start your productivity journey today</p>

            <form method="POST" class="auth-form">
                {% csrf_token %}

                <div class="form-group">
                    <label>Username</label>
                    {{ form.username }}
                    <small class="help-text">
                        150 characters max. Letters, digits and @/./+/-/_ only.
                    </small>
                </div>

                <div class="form-group password-wrapper">
                    <label>Password</label>
                    {{ form.password1 }}
                    <span class="toggle-password" onclick="togglePass('id_password1', this)">👁</span>
                </div>

                <div class="form-group password-wrapper">
                    <label>Confirm Password</label>
                    {{ form.password2 }}
                    <span class="toggle-password" onclick="togglePass('id_password2', this)">👁</span>
                </div>

                <button type="submit" class="btn-primary">
                    Register
                </button>
            </form>

            <p class="auth-footer">
                Already have an account?
                <a href="{% url 'login' %}">Login</a>
            </p>
        </div>
    </div>

    <script>
        function togglePass(id, icon) {
            const input = document.getElementById(id);
            const type = input.type === "password" ? "text" : "password";
            input.type = type;
            icon.textContent = type === "password" ? "👁" : "🙈";
        }
    </script>
</body>
</html>
